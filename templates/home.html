<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
  </head>
  <body>

    {% for book in books %}
    <div> <h3>The book: {{ book.title }} is written by
      {% for author in authors %}
      {% if author.id == book.author_id %}
      {{author.name}}</h3>
      {% endif %}
      {% endfor %}
    </div>
    {% endfor %}

  </body>
</html>
